<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./unit.css">
    <title>Unit</title>
</head>

<body>

<h1>Units</h1>

<table class="table">

    <!-- Title Row -->
    <tr>
        <th class= " th" colspan="6">Time Table</th>
    </tr>

    <!-- Heading Row -->
    <tr>
        <th  class= " th"rowspan="6">Hours</th>
        <th class= " th">Mon</th>
        <th class= " th">Tues</th>
        <th class= " th">Wed</th>
        <th class= " th">Thurs</th>
        <th class= " th">Fri</th>
    </tr>

    <!-- Row 1 -->
    <tr>
        <td class="td">Science</td>
        <td class="td">Maths</td>
        <td class="td">Science</td>
        <td class="td">Maths</td>
        <td class="td">Arts</td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td class="td">Science</td>
        <td class="td">Maths</td>
        <td class="td">Science</td>
        <td class="td">Maths</td>
        <td class="td">Arts</td>
    </tr>

    <!-- Lunch -->
    <tr>
        <th class= " th" colspan="5">Lunch</th>
    </tr>

    <!-- Row 3 -->
    <tr>
        <td class="td">Science</td>
        <td class="td">Maths</td>
        <td class="td">Science</td>
        <td class="td">Maths</td>
        <td class="td" rowspan="2">Project</td>
    </tr>

    <!-- Row 4 -->
    <tr>
        <td class="td">Science</td>
        <td class="td">Maths</td>
        <td class="td">Science</td>
        <td class="td">Maths</td>
    </tr>

</table>

</body>
</html>
