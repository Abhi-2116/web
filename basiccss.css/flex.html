<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        h1 {
            padding: 5px;
            font-size: 50px;
            font-weight: bolder;
            color: rgb(119, 16, 214);
            text-decoration: palevioletred;
        }

        .flex0 {
            padding: 10px;
            margin: 10px;
            border: 2px solid black;
            background-color: rgb(109, 109, 210);
            display: flex;
            width: 300px;
            height: 400px;
            flex-direction:row ;
            flex-wrap: wrap;
            flex-wrap: nowrap;
            flex-wrap: wrap-reverse;
            justify-content: center;
            text-align: center;
            justify-content: space-between;
            justify-content: flex-end;
            justify-content: flex-start;
            gap: 5px;
        }

       .flex1,.flex2,.flex3 {
            background: green;
            margin: 10px;
            height: 100px;
            width: 100px;
            font-weight: bolder;
            border: 5px solid rgb(9, 235, 186);

        }

        .img {
            height: 90px;
            width: 80px;
            margin: 4px;
            padding: 0px;
        }
        #item1{
            flex-grow: 4;
            order: 1;
            flex-basis: content;
        }
        
    </style>
</head>

<body>
    <h1>Flex</h1>
    <div class="flex0">
        <div class="flex1" id="item1">1
            <img src="../images/19.jpg" alt="" class="img">
        </div>
        <div class="flex2" id="item2">2
            <img src="../images/18.avif" alt="" class="img">
        </div>
        <div class="flex3">3
            <img src="../images/20.jpg" alt="" class="img">
        </div>
        <div class="flex1">1
            <img src="../images/17.webp" alt="" class="img">
        </div>
        <div class="flex2">2
            <img src="../images/13.jpg" alt="" class="img">
        </div>
        <div class="flex3">3
            <img src="../images/16.webp" alt="" class="img">
        </div>
    </div>

    

</body>

</html>
